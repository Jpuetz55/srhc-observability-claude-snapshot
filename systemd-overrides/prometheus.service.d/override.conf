[Service]
# Replace the packaged ExecStart so Prometheus uses the repo-managed config,
# 30-day local TSDB retention, lifecycle reloads, and the local storage path.
ExecStart=
ExecStart=/usr/local/bin/prometheus \
  --config.file=/etc/prometheus/prometheus.yml \
  --storage.tsdb.path=/var/lib/prometheus/local-tsdb \
  --web.listen-address=0.0.0.0:9090 \
  --web.enable-lifecycle \
  --storage.tsdb.retention.time=30d \
  --storage.tsdb.retention.size=300GB
