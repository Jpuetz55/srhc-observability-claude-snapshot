name: PCAP Study

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  pcap-study:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml

      - name: Run PCAP study tests
        run: |
          make test-pcap-study
