# Grafana managed alerting rules that watch the normalized platform recording
# rules in Prometheus/Mimir. Dashboard JSON is validated separately; these rules
# keep runtime health visible even when dashboards are not open.
apiVersion: 1

groups:
  - orgId: 1
    name: platform_health
    folder: Platform - Deployment Health
    interval: 30s
    rules:
      # Alert when too many Prometheus scrape targets are down. Query A reads the
      # recording rule; query B applies Grafana's classic threshold condition.
      - uid: platform_target_up_low
        title: Platform Target Up Ratio Low
        condition: B
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: efbjrspdsbl6oa
            model:
              expr: platform_target_up_ratio
              hide: false
              intervalMs: 30000
              maxDataPoints: 43200
              refId: A
          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params: [0.8]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "-100"
              expression: A
              hide: false
              intervalMs: 30000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: Too many scrape targets are down
          description: The ratio of healthy scrape targets dropped below 80 percent.
        labels:
          severity: warning
          team: platform
          component: observability
