# Additional dashboard allowances for metrics that are not managed by this repo
# or are accepted by prefix. Keep this section narrow so real contract drift is
# still caught during dashboard validation.
dashboard_metric_contract:
  external_metrics:
    - ALERTS
    - up
    - kube_pod_status_ready
    - cortex_request_duration_seconds_count
    - mimir_request_duration_seconds_count
  external_metric_prefixes:
    - prometheus_
    - process_
  prototype_metrics: []
