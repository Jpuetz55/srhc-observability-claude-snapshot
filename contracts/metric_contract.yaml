# Metric contract consumed by scripts/check_dashboard_metric_contract.py and
# scripts/check_contract_schema.py. It documents which metrics may appear in
# dashboard JSON so dashboard edits fail fast when they reference misspelled,
# deleted, or semantically wrong series.

