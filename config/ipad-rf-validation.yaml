# Default config for iPad WLC-client RF validation against Ekahau survey points.
# This workflow parses manually collected WLC client scan-report snapshots. It
# is intentionally separate from Catalyst Center device-command workflows, the
# Vocera badge upload path, and ICAP QoE control/test workflows.

timezone: America/Chicago

default_match_window_seconds: 1
require_same_measurement_date: true

minimum_samples_for_outlier_stats: 30
outlier_z_score_threshold: 2.0

rssi_offsets:
  default_source: "iPad WLC Client Scan Reports vs Ekahau; provisional zero offset"
  by_model:
    iPad:
      "2.4GHz": 0
      "5GHz": 0
      "6GHz": 0
    IPAD:
      "2.4GHz": 0
      "5GHz": 0
      "6GHz": 0
  by_band:
    "2.4GHz": 0
    "5GHz": 0
    "6GHz": 0

badge_radio_signal:
  associated_sample_match_window_seconds: 300

ekahau_json:
  timestamp_keys:
    - timestamp
    - time
    - measuredAt
    - measurementTime
    - surveyTime
    - collectionTime
    - createdAt
  id_keys:
    - id
    - uuid
    - guid
    - measurementId
    - surveyPointId
  floor_keys:
    - floor
    - floorName
    - mapName
    - level
  area_keys:
    - area
    - zone
    - room
  x_keys:
    - x
    - x_m
    - positionX
  y_keys:
    - y
    - y_m
    - positionY

normalization:
  mac_format: colon_lower
  require_same_bssid: true
  prefer_same_channel: true
  allow_band_match_if_channel_missing: true

manual_entry:
  required_fields:
    - ekahau_rssi_dbm
  optional_fields:
    - ekahau_snr_db
    - notes
